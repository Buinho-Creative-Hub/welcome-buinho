<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2364ff">
  <title>Welcome to Buinho</title>
  <meta name="description" content="Pocket guide for artists in residence at Buinho FabLab, Messejana.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Asap:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <button id="backbtn" class="back" style="visibility:hidden">‹</button>
    <span class="brand"><span class="dot"></span><span id="brand-name">Welcome to Buinho</span></span>
    <span class="spacer"></span>
    <div class="lang">
      <button data-l="en" class="on">EN</button>
      <button data-l="pt">PT</button>
    </div>
  </header>

  <main class="app">
    <section id="view-home" class="view active"></section>
    <section id="view-detail" class="view"></section>
  </main>

  <nav class="bottombar">
    <div class="inner">
      <button data-go="home" class="on"><span class="bi">🏠</span>Home</button>
      <button data-go="fablab"><span class="bi">🛠️</span>FabLab</button>
      <button data-go="checkin"><span class="bi">✅</span>Check-in</button>
      <button data-go="contacts"><span class="bi">☎️</span>SOS</button>
    </div>
  </nav>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
